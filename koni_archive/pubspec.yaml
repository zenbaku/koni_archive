name: koni_archive
description: >-
  Format-agnostic archive reading and writing for Dart — one streaming-first API over ZIP, TAR, GZIP, 7z, and RAR. Facade of the koni_archive ecosystem.
version: 0.8.0
repository: https://github.com/zenbaku/koni_archive
topics:
  - archive
  - zip
  - compression
  - comics
environment:
  sdk: ^3.7.0
resolution: workspace

dependencies:
  glob: ^2.1.2
  koni_archive_core: ^0.8.0
  koni_gzip: ^0.8.0
  koni_rar: ^0.8.0
  koni_sevenz: ^0.8.0
  koni_tar: ^0.8.0
  koni_zip: ^0.8.0
  path: ^1.9.0
  web: ^1.1.0

dev_dependencies:
  crypto: ^3.0.0
  lints: ^6.0.0
  test: ^1.26.0
