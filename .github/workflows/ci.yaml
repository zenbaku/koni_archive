name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: dart analyze --fatal-infos

  test-vm:
    name: VM tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      # 60 s fuzz smoke per format in CI (§11); local runs default to 5 s.
      KONI_ARCHIVE_FUZZ_SECONDS: '60'
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart run tool/run_tests.dart --platform vm

  test-web:
    name: Web tests (${{ matrix.compiler }})
    strategy:
      fail-fast: false
      matrix:
        compiler: [dart2js, dart2wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: >-
          dart run tool/run_tests.dart
          --platform chrome
          --compiler ${{ matrix.compiler }}
